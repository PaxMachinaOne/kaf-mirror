image:
  repository: ghcr.io/scalytics/kaf-mirror
  tag: "v1.2.0"
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 8088
  targetPort: 8080

# Kafka clusters — override per deployment. See configs/docker.yml for schema.
config:
  server:
    host: "0.0.0.0"
    port: 8080
    mode: "production"
  sourceBrokers: "kafscale-broker:9092"
  targetBrokers: "kafscale-broker-standby:9092"

persistence:
  enabled: true
  storageClass: ""
  size: 2Gi

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

probes:
  liveness:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 15
    periodSeconds: 20
  readiness:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10

# PSA-restricted-compatible (PLAN-06 E-04 / audit F-4). kaf-mirror's
# Dockerfile runs as UID 65532 (distroless nonroot). Container key
# `securityContext` predates the `containerSecurityContext` convention
# used in newer SAO charts; kept as-is for backward compatibility.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  readOnlyRootFilesystem: false
  capabilities:
    drop: ["ALL"]
  seccompProfile:
    type: RuntimeDefault

serviceAccount:
  create: true
  name: ""
  annotations: {}

labels:
  app.kubernetes.io/part-of: ops-foundation

nodeSelector: {}
tolerations: []
affinity: {}
