{{- /*
  servicemonitor.yaml — Prometheus Operator ServiceMonitor for kaf-mirror.
  Gated by `.Values.metrics.enabled` (default false). PLAN-06 iter-7
  E-12 / G-007. BUG-0011: binary instrumentation pending.
*/}}
{{- if .Values.metrics.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "kaf-mirror.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kaf-mirror.labels" . | nindent 4 }}
    {{- with .Values.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "kaf-mirror.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: {{ .Values.metrics.path | quote }}
      interval: {{ .Values.metrics.serviceMonitor.interval | quote }}
      scrapeTimeout: {{ .Values.metrics.serviceMonitor.scrapeTimeout | quote }}
{{- end }}
