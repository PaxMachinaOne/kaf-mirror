apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kaf-mirror.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kaf-mirror.labels" . | nindent 4 }}
data:
  default.yml: |
    server:
      host: {{ .Values.config.server.host | quote }}
      port: {{ .Values.config.server.port }}
      mode: {{ .Values.config.server.mode | quote }}
      tls:
        enabled: false
      cors:
        allowed_origins: ["*"]
    logging:
      file: "/tmp/kaf-mirror.log"
      level: "INFO"
      max_size: 100
      max_backups: 5
      max_age: 30
      console: true
    database:
      path: "/tmp/kaf-mirror.db"
      retention_days: 30
    source_cluster:
      brokers: {{ .Values.config.sourceBrokers | quote }}
      security:
        enabled: false
    target_cluster:
      brokers: {{ .Values.config.targetBrokers | quote }}
      security:
        enabled: false
    replication:
      batch_size: 1000
      parallelism: 4
      compression: "none"
      topic_discovery_interval: "5m"
